name: Selenium E2E Testing Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Chrome and ChromeDriver
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
      id: setup-chrome

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      working-directory: frontend
      run: npm install

    - name: Run Dev Server and Tests
      working-directory: frontend
      env:
        CHROMEWEBDRIVER: ${{ steps.setup-chrome.outputs.chromedriver-path }}
      run: |
        npm run dev &
        npx wait-on http://localhost:5173/Farm-smart-agri/ --timeout 30000
        npm run login

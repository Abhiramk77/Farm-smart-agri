name: Selenium E2E Testing Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  selenium-test:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Dependencies
      working-directory: frontend
      run: npm install

    - name: Start Dev Server
      working-directory: frontend
      run: |
        npm run dev &
        npx wait-on http://localhost:5173/Farm-smart-agri/ --timeout 60000

    - name: Run Selenium Tests
      working-directory: frontend
      run: |
        npm run login -- --reporter json > selenium-report.json || true

    - name: Upload Selenium Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-web-test-report
        path: frontend/selenium-report.json
